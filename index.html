<!DOCTYPE html>
<html>
<head>
  <title>Admin Servis AC - Kabul Jaya Teknik</title>
</head>
<body>

<h2>Admin Servis AC - Kabul Jaya Teknik</h2>

<input id="nama" placeholder="Nama Pelanggan"><br><br>
<input id="hp" placeholder="No HP"><br><br>
<input id="alamat" placeholder="Alamat"><br><br>
<input id="merk" placeholder="Merk AC"><br><br>
<input id="pk" placeholder="PK"><br><br>
<input id="keluhan" placeholder="Keluhan"><br><br>
<input id="biaya" placeholder="Biaya"><br><br>
<input id="teknisi" placeholder="Nama Teknisi"><br><br>

<select id="status">
  <option value="Proses">Proses</option>
  <option value="Selesai">Selesai</option>
  <option value="Pending">Pending</option>
</select><br><br>

<button onclick="tambah()">Tambah / Update</button>

<h3>Data Servis</h3>
<div id="listData"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, update } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "ISI_API_KEY_KAMU",
  authDomain: "kjt-admin.firebaseapp.com",
  databaseURL: "https://kjt-admin-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "kjt-admin",
  storageBucket: "kjt-admin.appspot.com",
  messagingSenderId: "605090490067",
  appId: "1:605090490067:web:f6e9d429a88ebc594b1626"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.tambah = function(){
  const data = {
    nama: document.getElementById("nama").value,
    hp: document.getElementById("hp").value,
    alamat: document.getElementById("alamat").value,
    merk: document.getElementById("merk").value,
    pk: document.getElementById("pk").value,
    keluhan: document.getElementById("keluhan").value,
    biaya: document.getElementById("biaya").value,
    teknisi: document.getElementById("teknisi").value,
    status: document.getElementById("status").value,
    waktu: new Date().toLocaleString()
  };

  push(ref(db, "data"), data);
  alert("Data berhasil disimpan");
};

onValue(ref(db, "data"), (snapshot) => {
  const data = snapshot.val();
  const list = document.getElementById("listData");
  list.innerHTML = "";

  if(!data){
    list.innerHTML = "Belum ada data";
    return;
  }

  for(let key in data){
    const d = data[key];

    list.innerHTML += `
      <div style="border:1px solid #ccc; padding:10px; margin:10px;">
        <b>${d.nama}</b> (${d.hp})<br>
        ${d.alamat}<br>
        ${d.merk} - ${d.pk}<br>
        Teknisi: ${d.teknisi}<br>
        Keluhan: ${d.keluhan}<br>
        Biaya: Rp ${d.biaya}<br>
        Waktu: ${d.waktu}<br>
        Status: ${d.status}<br><br>

        <button onclick="setStatus('${key}','Proses')">Proses</button>
        <button onclick="setStatus('${key}','Selesai')">Selesai</button>
        <button onclick="setStatus('${key}','Pending')">Pending</button>

        <button onclick="kirimWA('${d.hp}','${d.nama}')">WA</button>
        <button onclick="hapus('${key}')">Hapus</button>
      </div>
    `;
  }
});

window.hapus = function(id){
  remove(ref(db, "data/" + id));
};

window.setStatus = function(id, status){
  update(ref(db, "data/" + id), { status: status });
};

window.kirimWA = function(hp, nama){
  let pesan = `Halo ${nama}, servis AC anda sedang diproses.`;
  window.open(`https://wa.me/${hp}?text=${encodeURIComponent(pesan)}`);
};

</script>

</body>
</html>
