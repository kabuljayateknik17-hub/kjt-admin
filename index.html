
<!DOCTYPE html>
<html>
<head>
  <title>KJT Admin</title>
  <style>
    body { font-family: Arial; background:#f5f5f5; padding:20px; }
    input { width:100%; padding:8px; margin:5px 0; }
    button { padding:10px; margin-top:10px; }
  </style>
</head>

<body>

<h2>Input Data Servis</h2>

<input id="nama" placeholder="Nama">
<input id="alamat" placeholder="Alamat">
<input id="tanggal" type="date">
<input id="jam" type="time">

<button onclick="tambah()">Simpan</button>

<hr>

<h3>Data Masuk</h3>
<div id="list"></div>

<!-- ================== SCRIPT TAMBAH ================== -->
<script>
function tambah(){
  let data = {
    nama: document.getElementById("nama").value,
    alamat: document.getElementById("alamat").value,
    tanggal: document.getElementById("tanggal").value,
    jam: document.getElementById("jam").value
  };

  simpanData(data);
}
</script>

<!-- ================== FIREBASE ================== -->
<script type="module">
// Import Firebase
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCXazgiVakDMT888hwnSLRKsOrNeZdyD9k",
  authDomain: "kjt-admin.firebaseapp.com",
  databaseURL: "https://kjt-admin-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "kjt-admin",
  storageBucket: "kjt-admin.firebasestorage.app",
  messagingSenderId: "605090490067",
  appId: "1:605090490067:web:f6e9d429a88ebc594b1626"
};

// INIT
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// SIMPAN
window.simpanData = function(data){
  push(ref(db, "data"), data);
}

// TAMPIL DATA
onValue(ref(db, "data"), (snapshot)=>{
  let data = snapshot.val();
  let html = "";

  for(let id in data){
    let d = data[id];
    html += `
      <div style="background:#fff; padding:10px; margin:10px 0;">
        <b>${d.nama}</b><br>
        ${d.alamat}<br>
        ${d.tanggal} - ${d.jam}<br>
        <button onclick="hapus('${id}')">Hapus</button>
      </div>
    `;
  }

  document.getElementById("list").innerHTML = html;
});

// HAPUS
window.hapus = function(id){
  remove(ref(db, "data/" + id));
}
</script>

</body>
</html>
