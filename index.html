<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "PASTE_APIKEY_KAMU",
  authDomain: "kjt-admin.firebaseapp.com",
  databaseURL: "https://kjt-admin-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "kjt-admin",
  storageBucket: "kjt-admin.appspot.com",
  messagingSenderId: "605090490067",
  appId: "1:605090490067:web:f6e9d429a88ebc594b1626"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.tambah = function(){
  const nama = document.getElementById("nama").value;
  const alamat = document.getElementById("alamat").value;

  push(ref(db, "data"), {
    nama: nama,
    alamat: alamat
  });

  alert("Berhasil disimpan");
};

onValue(ref(db, "data"), (snapshot) => {
  const data = snapshot.val();
  const list = document.getElementById("listData");
  list.innerHTML = "";

  if(!data){
    list.innerHTML = "Belum ada data";
    return;
  }

  for(let key in data){
    list.innerHTML += `<p><b>${data[key].nama}</b> - ${data[key].alamat}</p>`;
  }
});
</script>
