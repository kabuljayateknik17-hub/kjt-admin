<script>
let data = JSON.parse(localStorage.getItem("servis")) || [];

function tampilkanData() {
    let table = document.getElementById("tableData");
    table.innerHTML = "";

    data.forEach((item, index) => {
        let pesan = `Halo ${item.nama}, servis AC Anda:\nMerk: ${item.merk}\nKeluhan: ${item.keluhan}\nBiaya: ${item.biaya}\nTeknisi: ${item.teknisi}`;
        let waLink = `https://wa.me/${item.hp}?text=${encodeURIComponent(pesan)}`;

        table.innerHTML += `
        <tr>
            <td>${item.nama}</td>
            <td>${item.hp}</td>
            <td>${item.merk}</td>
            <td>${item.keluhan}</td>
            <td>${item.biaya}</td>
            <td>${item.teknisi}</td>
            <td>
                <button onclick="editData(${index})">Edit</button>
                <button onclick="hapus(${index})">Hapus</button>
                <a href="${waLink}" target="_blank">
                    <button>WA</button>
                </a>
            </td>
        </tr>
        `;
    });
}
</script>
