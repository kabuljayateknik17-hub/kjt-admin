<script>
const firebaseConfig = {
  apiKey: "AIzaSyCXazgiVakDMT888hwnSLRKsOrNeZdyD9k",
  authDomain: "kjt-admin.firebaseapp.com",
  databaseURL: "https://kjt-admin-default-rtdb.asia-southeast1.firebasedatabase.app",

  messagingSenderId: "605090490067",
  appId: "1:605090490067:web:f6e9d429a88ebc594b1626"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// SIMPAN
function tambah(){
  const nama = document.getElementById("nama").value;
  const alamat = document.getElementById("alamat").value;

  if(!nama || !alamat){
    alert("Isi dulu!");
    return;
  }

  db.ref("data").push({
    nama: nama,
    alamat: alamat
  });

  alert("Berhasil disimpan!");
}

// TAMPIL
db.ref("data").on("value", function(snapshot){
  const data = snapshot.val();
  const list = document.getElementById("listData");

  list.innerHTML = "";

  if(!data){
    list.innerHTML = "Belum ada data";
    return;
  }

  for(let key in data){
    list.innerHTML += `
      <div>
        <b>${data[key].nama}</b><br>
        ${data[key].alamat}
      </div>
    `;
  }
});
</script>
