<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyCXazgiVakDMT888hwnSLRKsOrNeZdyD9k",
  authDomain: "kjt-admin.firebaseapp.com",
  databaseURL: "https://kjt-admin-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "kjt-admin"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();

function tambah(){
  var nama = document.getElementById("nama").value;
  var alamat = document.getElementById("alamat").value;

  db.ref("data").push({
    nama: nama,
    alamat: alamat
  });
}

// TAMPILKAN DATA (INI YANG PENTING)
db.ref("data").on("value", function(snapshot){
  var html = "";
  snapshot.forEach(function(child){
    var data = child.val();
    html += "<p>" + data.nama + " - " + data.alamat + "</p>";
  });

  document.getElementById("list").innerHTML = html;
});
</script>
