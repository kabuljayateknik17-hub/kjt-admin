<!DOCTYPE html>
<html>
<head>
  <title>KJT Admin</title>
</head>
<body>

<h2>Input Servis</h2>

<input id="nama" placeholder="Nama"><br><br>
<input id="alamat" placeholder="Alamat"><br><br>

<button onclick="tambah()">Simpan</button>

<h3>Data</h3>
<div id="list"></div>

<!-- Firebase versi SIMPLE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "PASTE_APIKEY_KAMU",
  authDomain: "kjt-admin.firebaseapp.com",
  databaseURL: "https://kjt-admin-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "kjt-admin"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function tambah(){
  var nama = document.getElementById("nama").value;
  var alamat = document.getElementById("alamat").value;

  db.ref("data").push({
    nama: nama,
    alamat: alamat
  });

  alert("OK");
}

db.ref("data").on("value", function(snapshot){
  var data = snapshot.val();
  var list = document.getElementById("list");
  list.innerHTML = "";

  for(var key in data){
    list.innerHTML += "<p>"+data[key].nama+" - "+data[key].alamat+"</p>";
  }
});
</script>

</body>
</html>
