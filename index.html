
<!DOCTYPE html>
<html>
<head>
  <title>KJT Admin</title>
</head>
<body>

<h2>Input Data Servis</h2>

<input id="nama" placeholder="Nama"><br><br>
<input id="alamat" placeholder="Alamat"><br><br>
<input id="keluhan" placeholder="Keluhan AC"><br><br>
<input id="teknisi" placeholder="Teknisi"><br><br>
<input id="wa" placeholder="No WhatsApp (628xxx)"><br><br>

<button onclick="tambah()">Simpan</button>

<h3>Data Masuk</h3>
<div id="listData">Loading...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCXazgiVakDMT888hwnSLRKsOrNeZdyD9k",
  authDomain: "kjt-admin.firebaseapp.com",
  databaseURL: "https://kjt-admin-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "kjt-admin",
  storageBucket: "kjt-admin.firebasestorage.app",
  messagingSenderId: "605090490067",
  appId: "1:605090490067:web:f6e9d429a88ebc594b1626"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.tambah = function(){
  const nama = document.getElementById("nama").value;
  const alamat = document.getElementById("alamat").value;
  const keluhan = document.getElementById("keluhan").value;
  const teknisi = document.getElementById("teknisi").value;
  const wa = document.getElementById("wa").value;

  if(!nama || !alamat || !keluhan || !teknisi || !wa){
    alert("Isi semua data!");
    return;
  }

  push(ref(db, "data"), { nama, alamat, keluhan, teknisi, wa });
}

onValue(ref(db, "data"), (snapshot) => {
  const data = snapshot.val();
  const list = document.getElementById("listData");

  list.innerHTML = "";

  if(!data){
    list.innerHTML = "Belum ada data";
    return;
  }

  for(let key in data){
    const d = data[key];

    list.innerHTML += `
      <div>
        <b>${d.nama}</b><br>
        ${d.alamat}<br>
        ${d.keluhan}<br>
        ${d.teknisi}<br>
        ${d.wa}<br>
        <a href="https://wa.me/${d.wa}" target="_blank">Chat WA</a>
        <hr>
      </div>
    `;
  }
});
</script>

</body>
</html>
